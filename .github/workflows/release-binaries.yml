# Build standalone PyInstaller binaries for GitHub Releases:
# - macOS arm64 (Apple Silicon, e.g. M4): GitHub-hosted macos-14 runner
# - Linux x86_64 with glibc matching RHEL 9 family: build inside CentOS Stream 9 image
#
# On tag push v*, tarballs + SHA256 sidecars are attached to the matching release.
# workflow_dispatch uploads workflow artifacts only (download from the run summary).

name: Release binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-binaries-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos-arm64:
    name: macOS arm64 (Apple Silicon)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          chmod +x build/build_executable.sh
          ./build/build_executable.sh

      - name: Package
        run: |
          set -euo pipefail
          BASENAME="pg_sandbox-macos-arm64"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            ASSET_BASENAME="${BASENAME}-${{ github.ref_name }}"
          else
            ASSET_BASENAME="${BASENAME}-$(git rev-parse --short HEAD)"
          fi
          tar -C bin -czvf "${ASSET_BASENAME}.tar.gz" pg_sandbox
          shasum -a 256 "${ASSET_BASENAME}.tar.gz" | tee "${ASSET_BASENAME}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: pg_sandbox-macos-arm64
          path: |
            pg_sandbox-macos-arm64-*.tar.gz
            pg_sandbox-macos-arm64-*.tar.gz.sha256

  build-linux-rhel9-x86_64:
    name: Linux x86_64 (CentOS Stream 9 / RHEL 9-compatible)
    runs-on: ubuntu-latest
    container:
      image: quay.io/centos/centos:stream9
    steps:
      - name: Install OS packages
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            git ca-certificates \
            python3 python3-pip \
            gcc patchelf zlib-devel

      - uses: actions/checkout@v4

      - name: Build
        run: |
          chmod +x build/build_executable.sh
          ./build/build_executable.sh

      - name: Package
        run: |
          set -euo pipefail
          BASENAME="pg_sandbox-linux-rhel9-x86_64"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            ASSET_BASENAME="${BASENAME}-${{ github.ref_name }}"
          else
            ASSET_BASENAME="${BASENAME}-$(git rev-parse --short HEAD)"
          fi
          tar -C bin -czvf "${ASSET_BASENAME}.tar.gz" pg_sandbox
          sha256sum "${ASSET_BASENAME}.tar.gz" | tee "${ASSET_BASENAME}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: pg_sandbox-linux-rhel9-x86_64
          path: |
            pg_sandbox-linux-rhel9-x86_64-*.tar.gz
            pg_sandbox-linux-rhel9-x86_64-*.tar.gz.sha256

  publish-release:
    name: Upload to GitHub Release
    needs: [build-macos-arm64, build-linux-rhel9-x86_64]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: pg_sandbox-*
          merge-multiple: true

      - name: List assets
        run: find release-assets -type f -ls

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-assets/*.tar.gz
            release-assets/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
